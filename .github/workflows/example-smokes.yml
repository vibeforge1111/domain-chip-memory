name: Example Smokes

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  spark-kb-example-smokes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package
        run: python -m pip install -e .

      - name: Run checked-in example smokes
        run: python docs/examples/run_smokes.py --write-dir tmp/example_smoke_artifacts_ci
