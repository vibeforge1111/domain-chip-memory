name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require Harness Core repo token
        env:
          SPARK_CI_REPO_TOKEN: ${{ secrets.SPARK_CI_REPO_TOKEN }}
        run: |
          if [ -z "$SPARK_CI_REPO_TOKEN" ]; then
            echo "::error::SPARK_CI_REPO_TOKEN is required to checkout private vibeforge1111/spark-harness-core for memory authority tests."
            exit 1
          fi

      - name: Checkout Harness Core
        uses: actions/checkout@v4
        with:
          repository: vibeforge1111/spark-harness-core
          ref: codex/genesis-harness-core-20260602
          path: spark-harness-core
          token: ${{ secrets.SPARK_CI_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package
        run: python -m pip install -e . pytest

      - name: Run pytest
        env:
          PYTHONPATH: ${{ github.workspace }}/spark-harness-core/src
        run: python -m pytest tests -q -rs --tb=short

      - name: Note benchmark fixture skips
        run: |
          {
            echo "Benchmark-data skips are expected on dataless CI runners."
            echo "Unexpected failures or missing skip reasons should fail the pytest step above."
          } >> "$GITHUB_STEP_SUMMARY"
