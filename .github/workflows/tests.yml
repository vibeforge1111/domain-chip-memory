name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package
        run: python -m pip install -e .

      - name: Run pytest
        run: python -m pytest tests -q -rs --tb=short

      - name: Note benchmark fixture skips
        run: |
          {
            echo "Benchmark-data skips are expected on dataless CI runners."
            echo "Unexpected failures or missing skip reasons should fail the pytest step above."
          } >> "$GITHUB_STEP_SUMMARY"
